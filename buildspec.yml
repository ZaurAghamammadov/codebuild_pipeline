version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 049460710775.dkr.ecr.us-east-1.amazonaws.com
      - IMAGE_TAG=latest
  build:
    commands:
      - echo Building the Docker image...
      # Point to the Dockerfile inside the calendly folder
      - docker build --platform linux/amd64 -t calendly -f calendly/Dockerfile calendly/
      - docker tag calendly:latest 049460710775.dkr.ecr.us-east-1.amazonaws.com/calendly:latest
  post_build:
    commands:
      - echo Pushing the Docker image to Amazon ECR...
      - docker push 049460710775.dkr.ecr.us-east-1.amazonaws.com/calendly:latest
      - echo Build completed successfully!
artifacts:
  files: []